<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Gemini</title>
    <link rel="stylesheet" href="style.css">
    <!-- Marked JS for formatting Markdown response -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Ask Gemini</h1>
            <p>Ask any question and get instant AI answers</p>
        </div>

        <div class="chat-box">
            <div id="answers" class="answers-container">
                <!-- Answers will be rendered here -->
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="questionInput" 
                    placeholder="Type your question... e.g. 'What is JavaScript?'"
                    class="question-input"
                >
                <button id="submitBtn" class="submit-btn">Send</button>
            </div>
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Getting response from Gemini...</p>
            </div>
            <div id="error" class="error-message hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
